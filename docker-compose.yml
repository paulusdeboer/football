services:
  php:
    image: wodby/laravel-php:8.3
    environment:
      APP_ENV: local
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: 'react_football'
      DB_USERNAME: 'laravel'
      DB_PASSWORD: 'laravel'
      PHP_POST_MAX_SIZE: 1000M
      PHP_UPLOAD_MAX_FILESIZE: 1000M
      PHP_UPLOAD_LIMIT: 100000000
      PHP_FPM_USER: wodby
      PHP_FPM_GROUP: wodby
      PHP_FPM_CLEAR_ENV: "no"
    working_dir: /var/www/html/
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"

  mariadb:
    image: wodby/mariadb:10.3
    environment:
      MYSQL_ROOT_PASSWORD: nimda
      MYSQL_DATABASE: react_football
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  nginx:
    image: nginx:latest
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

  node:
    image: node:20
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: bash -c "npm install && npm run dev"
    ports:
      - "5173:5173"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mariadb_data: